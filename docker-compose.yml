services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hormunity_app
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-hormunity_db}
      DB_USERNAME: ${DB_USERNAME:-hormunity}
      DB_PASSWORD: ${DB_PASSWORD:-hormunity_secret}
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: hormunity_db
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hormunity_db}
      MYSQL_USER: ${DB_USERNAME:-hormunity}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hormunity_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migrations/001_create_orders_tables.sql:/docker-entrypoint-initdb.d/001_create_orders_tables.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
